# Fern generator config for the OnePin Python SDK.
#
# This repo self-generates its SDK. The OnePin API spec is shaped upstream (x-fern + servers
# folded into the published OpenAPI), so this is a VANILLA generate — no overlay/overrides here.
#
# regen.yml fetches the shaped spec into ./openapi/openapi.yml, then `fern generate
# --group python-sdk --local` writes the SDK into ../src/onepin. The hand-rolled CLI under
# src/onepin/_cli/ is preserved by src/onepin/.fernignore (auto-discovered in the local
# output dir; Fern CLI >= 4.16).
api:
  specs:
    - openapi: openapi/openapi.yml

groups:
  python-sdk:
    generators:
      - name: fernapi/fern-python-sdk
        # `latest` is acceptable because regen opens a *reviewed* PR, so any generator-driven
        # output change is visible in the diff before merge. TODO: pin to a concrete
        # fern-python-sdk version for fully reproducible regens once one is recorded.
        version: latest
        output:
          location: local-file-system
          path: ../src/onepin
        config:
          client_class_name: OnePinClient
          package_name: onepin
          flat_layout: false
          # NOTE on pagination: fern-python-sdk has NO `pagination` config key (its
          # SDKCustomConfig forbids extra keys — a `pagination: true` here breaks every
          # regen with a pydantic extra_forbidden error). Pager generation is driven by
          # the x-fern-pagination annotations already present in the spec, gated only by
          # CLI/generator support. The CLI's pager output path handles both shapes.
          # Re-export the hand-rolled version gate (src/onepin/_version_gate.py, preserved by
          # .fernignore) from the generated package __init__ on every regen, so programmatic
          # users get `from onepin import make_client` (a version-gated OnePinClient).
          additional_init_exports:
            - from: _version_gate
              imports:
                - make_client
                - make_async_client
                - OnePinUpgradeRequiredError
            # Hand-rolled credential-resolving client (src/onepin/_client.py, preserved by
            # .fernignore). Gives programmatic users `from onepin import OnepinClient`, which
            # reads the same key `onepin login` stores. See also _auth_resolve.py.
            - from: _client
              imports:
                - OnepinClient
                - AsyncOnepinClient
            - from: _auth_resolve
              imports:
                - OnepinAuthError
