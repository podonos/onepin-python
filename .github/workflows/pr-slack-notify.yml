name: PR Slack Notify

# Posts a Slack card when a PR is opened / marked ready / reopened.
# Public-repo safe: the only credential is the SLACK_WEBHOOK_URL secret, which lives in
# repo Settings -> Secrets (never committed, redacted from logs, and not injected into fork
# PRs). The destination channel is baked into that webhook URL, so no channel ID is in code.

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

permissions:
  contents: read

jobs:
  notify:
    # Skip drafts; only announce real PRs.
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post new-PR card to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AVATAR: ${{ github.event.pull_request.user.avatar_url }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_ADD: ${{ github.event.pull_request.additions }}
          PR_DEL: ${{ github.event.pull_request.deletions }}
        run: |
          # No secret -> skip quietly (no error, no leak). The secret is empty for:
          #   - fork PRs: GitHub withholds Actions secrets from forks (expected: no card).
          #   - Dependabot PRs unless a Dependabot-scoped secret of the same name is set.
          #     Set one (`gh secret set SLACK_WEBHOOK_URL --app dependabot`) to have
          #     Dependabot PRs post too; without it, they skip here.
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::notice::SLACK_WEBHOOK_URL not set (fork or Dependabot PR, or unconfigured) -- skipping."
            exit 0
          fi

          # Labels are an array — read them from the event payload, not env.
          LABELS=$(jq -r '[.pull_request.labels[].name] | join(", ")' "$GITHUB_EVENT_PATH")

          # jq --arg JSON-escapes every field (safe transport). Slack mrkdwn is a SEPARATE
          # layer: any value placed in mrkdwn must HTML-entity-escape & < > (the `esc` def)
          # or a title/branch like "a > b" truncates the link. Untrusted PR fields arrive via
          # env / the event file and are consumed as quoted shell vars (never interpolated
          # into the script as a GitHub expression), so there's no injection.
          payload=$(jq -nc \
            --arg t "$PR_TITLE" \
            --arg u "$PR_URL" \
            --arg n "$PR_NUM" \
            --arg a "$PR_AUTHOR" \
            --arg av "$PR_AVATAR" \
            --arg br "$PR_BRANCH" \
            --arg ba "$PR_BASE" \
            --arg add "$PR_ADD" \
            --arg del "$PR_DEL" \
            --arg labels "$LABELS" \
            'def esc: gsub("&"; "&amp;") | gsub("<"; "&lt;") | gsub(">"; "&gt;");
             ("by `" + ($a|esc) + "` · `" + ($br|esc) + " → " + ($ba|esc) + "` · `+" + $add + " -" + $del + "`"
               + (if $labels == "" then "" else " · " + ($labels|esc) end)) as $meta
             | ({type: "section", text: {type: "mrkdwn", text: ("*<" + $u + "|" + ($t|esc) + ">*\n" + $meta)}}
                + (if $av == "" then {} else {accessory: {type: "image", image_url: $av, alt_text: ("@" + $a)}} end)) as $section
             | {blocks: [
              {type: "header", text: {type: "plain_text", text: ("🔀 New PR #" + $n), emoji: true}},
              $section,
              {type: "actions", elements: [
                {type: "button", text: {type: "plain_text", text: "View PR", emoji: true}, url: $u, style: "primary"}
              ]}
            ]}')

          # GitHub's default shell is `bash --noprofile --norc -eo pipefail`: a non-zero curl
          # (timeout, DNS, network — likelier now with --retry) would abort the step under
          # errexit BEFORE the warning below runs, reddening the PR check. `|| code="000"`
          # keeps this notification-only job green and degrades to a logged warning instead.
          code=$(curl -sS --max-time 10 --retry 2 --retry-connrefused \
            -o /dev/null -w '%{http_code}' -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$payload") || code="000"
          if [ "$code" != "200" ]; then
            echo "::warning::Slack webhook POST failed or returned HTTP $code"
          fi
