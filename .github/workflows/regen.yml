name: Regenerate SDK

# Self-generates the OnePin Python SDK from the shaped OnePin API OpenAPI spec.
# The hand-rolled CLI under src/onepin/_cli/ is preserved natively via src/onepin/.fernignore.
#
# Triggers (never publish ahead of prod):
#   repository_dispatch[api-spec-updated] {sha, spec_version, environment}
#     environment=prod -> open a regen PR (the only regen PRs that merge → main never
#                         leads prod; release-please + publish.yml then ship it)
#     environment=dev  -> generation smoke-check only, NO PR
#   workflow_dispatch  -> manual regen PR from a given spec-repo SHA (default: main HEAD)
#
# Requires a GitHub App (org secrets PIPELINE_APP_ID / PIPELINE_APP_PRIVATE_KEY) and the
# repo secret SPEC_REPO (name of the backend repo that publishes api-spec.yaml). The App
# is installed with Contents read on the spec repo and Contents + Pull-requests write here
# (the default GITHUB_TOKEN would not fire CI on the opened PR).

on:
  repository_dispatch:
    types: [api-spec-updated]
  workflow_dispatch:
    inputs:
      sha:
        description: "Spec-repo commit SHA to generate from (default: main HEAD)"
        required: false
        default: ""

permissions:
  contents: read

# One regen per spec commit at a time; don't cancel an in-flight regen (it may be mid-PR).
# Distinct shas regenerate independently.
concurrency:
  group: regen-${{ github.event.client_payload.sha || github.event.inputs.sha || github.run_id }}
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve trigger inputs
        id: vars
        env:
          PAYLOAD_ENV: ${{ github.event.client_payload.environment }}
          PAYLOAD_SHA: ${{ github.event.client_payload.sha }}
          PAYLOAD_SPEC_VERSION: ${{ github.event.client_payload.spec_version }}
          INPUT_SHA: ${{ github.event.inputs.sha }}
        run: |
          set -euo pipefail
          ENV="${PAYLOAD_ENV:-manual}"
          SHA="${PAYLOAD_SHA:-$INPUT_SHA}"
          # dev is a smoke-check only; prod (and manual) open a PR.
          if [ "$ENV" = "dev" ]; then OPEN_PR=false; else OPEN_PR=true; fi
          # spec_version comes from the dispatch payload (write-access-controllable). Validate
          # to a clean semver — grep -z anchors the WHOLE string, so a multi-line value can't
          # smuggle extra $GITHUB_OUTPUT lines or inject the commit subject — else fall to n/a.
          VER="${PAYLOAD_SPEC_VERSION:-n/a}"
          printf '%s' "$VER" | grep -qzE '^([0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?|n/a)$' || VER="n/a"
          {
            echo "env=$ENV"
            echo "sha=$SHA"
            echo "spec_version=$VER"
            echo "open_pr=$OPEN_PR"
          } >> "$GITHUB_OUTPUT"

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.PIPELINE_APP_ID }}
          private-key: ${{ secrets.PIPELINE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }},${{ secrets.SPEC_REPO }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          # The guard tests build the wheel (tests/build) via hatch-vcs, which derives
          # the version from git history + tags; a shallow/tagless checkout would build
          # a bogus low version and trip the version-sanity assertions.
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch shaped spec
        id: spec
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          SPEC_REPO: ${{ secrets.SPEC_REPO }}
          REQ_SHA: ${{ steps.vars.outputs.sha }}
        run: |
          set -euo pipefail
          if [ -z "${SPEC_REPO:-}" ]; then
            echo "::error::Secret SPEC_REPO is not set (name of the backend spec repo)."; exit 1
          fi
          REF="${REQ_SHA:-main}"
          # Pin to the concrete commit SHA so the regen is reproducible.
          RESOLVED_SHA=$(gh api "repos/${OWNER}/${SPEC_REPO}/commits/${REF}" --jq '.sha')
          echo "resolved_sha=$RESOLVED_SHA" >> "$GITHUB_OUTPUT"
          mkdir -p fern/openapi
          gh api "repos/${OWNER}/${SPEC_REPO}/contents/api-spec.yaml?ref=${RESOLVED_SHA}" \
            -H "Accept: application/vnd.github.raw" > fern/openapi/openapi.yml
          echo "Fetched api-spec.yaml @ ${RESOLVED_SHA} ($(wc -l < fern/openapi/openapi.yml) lines)"
          # The spec must be SHAPED (x-fern shaping present). A raw spec would silently
          # produce an unshaped SDK — fail loudly instead.
          if ! grep -q 'x-fern-sdk-group-name' fern/openapi/openapi.yml; then
            echo "::error::Fetched spec carries no x-fern shaping — backend SDK-shaping export missing at ${RESOLVED_SHA}."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install -g fern-api@5.45.3   # pin to fern.config.json
      - run: fern check

      - name: Generate Python SDK (local; src/onepin/.fernignore preserves _cli/)
        run: fern generate --group python-sdk --local

      - name: Restore PEP 561 markers
        run: bash scripts/post_fern.sh

      - name: Guard — CLI preserved + non-bare + shaped client
        run: |
          set -euxo pipefail
          SRC=src/onepin
          # 1. Hand-rolled CLI survived the regen (.fernignore worked).
          [ -f "$SRC/_cli/main.py" ] || { echo "::error::src/onepin/_cli/ clobbered — .fernignore failed"; exit 1; }
          [ -f "$SRC/py.typed" ] && [ -f "$SRC/_cli/py.typed" ] || { echo "::error::py.typed markers missing — run scripts/post_fern.sh"; exit 1; }
          # 2. Non-bare client: real resource subclients + models present.
          { [ -d "$SRC/workflows" ] && [ -d "$SRC/types" ]; } || { echo "::error::generated client is bare — spec wiring regressed"; exit 1; }
          # 3. Overlay shaping applied: nested workflows.runs subclient + clean method name.
          { [ -d "$SRC/workflows/runs" ] && grep -q 'def start(' "$SRC/workflows/runs/client.py"; } \
            || { echo "::error::overlay shaping missing — client.workflows.runs.start not generated"; exit 1; }
          echo "CLI preserved + non-bare + shaped client confirmed."

      - name: Build/CLI guard tests
        run: |
          pip install uv
          uv sync --all-extras
          uv run pytest tests/build -q

      - name: Record source spec sha (.spec-sha — consumed by promote-prod.yml)
        if: steps.vars.outputs.open_pr == 'true'
        env:
          RESOLVED_SHA: ${{ steps.spec.outputs.resolved_sha }}
        # Stamp the exact spec commit this SDK was generated from into a TRACKED file at
        # repo root. peter-evans/create-pull-request commits all worktree changes, so writing
        # it BEFORE that step bakes it into the regen PR → it rides along to the release tag.
        # promote-prod.yml reads .spec-sha@<tag> to promote exactly the SDK whose API is in
        # prod (per-sha pinning by spec-commit ancestry), never an SDK ahead of prod.
        run: |
          set -euo pipefail
          printf '%s\n' "$RESOLVED_SHA" > .spec-sha
          echo "Recorded .spec-sha=${RESOLVED_SHA}"

      - name: Compose PR title
        id: title
        if: steps.vars.outputs.open_pr == 'true'
        env:
          VER: ${{ steps.vars.outputs.spec_version }}
          SHA: ${{ steps.spec.outputs.resolved_sha }}
        run: |
          set -euo pipefail
          # The SDK tracks the API, so the meaningful "what changed" is the API version, not
          # the regen sha (kept in the PR body + .spec-sha for traceability). release-please
          # turns this commit subject into the CHANGELOG line — keep it human-readable.
          if [ -n "${VER:-}" ] && [ "$VER" != "n/a" ]; then
            echo "title=feat: sync SDK to OnePin API v${VER}" >> "$GITHUB_OUTPUT"
          else
            echo "title=feat: regenerate SDK @${SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Open regen PR
        if: steps.vars.outputs.open_pr == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: fern-regen/${{ steps.spec.outputs.resolved_sha }}
          base: main
          delete-branch: true
          # feat: (not chore:) so a merged regen PR makes release-please cut a minor bump
          # (bump-minor-pre-major) → vX.Y.Z tag → publish.yml → TestPyPI. A chore: regen
          # is invisible to release-please and would never reach the index. Subject comes
          # from steps.title — "sync SDK to OnePin API vX.Y.Z" — so the CHANGELOG reads well.
          commit-message: "${{ steps.title.outputs.title }}"
          title: "${{ steps.title.outputs.title }}"
          body: |
            Auto-regenerated from the shaped OnePin API OpenAPI spec.

            - **Spec commit:** `${{ steps.spec.outputs.resolved_sha }}`
            - **Spec version:** `${{ steps.vars.outputs.spec_version }}`
            - **Trigger env:** `${{ steps.vars.outputs.env }}`

            The hand-rolled CLI under `src/onepin/_cli/` is preserved via `src/onepin/.fernignore`.
            Review the diff, let CI run, then merge to ship the new SDK surface.
          labels: auto:sdk-regen

      - name: Smoke-check note (dev — no PR)
        if: steps.vars.outputs.open_pr != 'true'
        run: echo "::notice::dev smoke-check passed — generation clean, CLI preserved. No PR (publish gated on prod)."
