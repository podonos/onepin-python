name: Publish
on:
  push:
    # Accept both formats: release-please default `onepin-v0.2.0` (component
    # prefix on single-package repos) and the plain `v0.2.0` shape used after
    # `include-component-in-tag: false` lands in release-please-config.json.
    tags: ['v*.*.*', 'onepin-v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. onepin-v0.2.0)'
        required: true
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Validate dispatch tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG_IN: ${{ inputs.tag }}
        # Constrain the manual-dispatch free-text input to a release-tag shape: stops a
        # build/publish from an arbitrary branch or SHA, and rejects a bogus/empty version
        # before anything is uploaded. The push: tags trigger is already filtered.
        run: |
          [[ "$TAG_IN" =~ ^(onepin-)?v[0-9]+\.[0-9]+\.[0-9]+([._-].+)?$ ]] \
            || { echo "::error::inputs.tag '$TAG_IN' is not a release tag (expected vX.Y.Z)"; exit 1; }
      - uses: actions/checkout@v6
        with:
          # workflow_dispatch may run on a branch ref. Qualify the dispatch input as
          # refs/tags/... so checkout resolves ONLY a tag (never a same-named branch);
          # on a tag push inputs.tag is empty -> falls back to the already-qualified ref.
          ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: pip install build twine trove-classifiers check-wheel-contents pytest
      - run: python -m build
      - run: twine check --strict dist/*
      - run: check-wheel-contents dist/*.whl
      - run: |
          python -c "
          from trove_classifiers import classifiers
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          for c in data['project'].get('classifiers', []):
              assert c in classifiers, f'Unknown classifier: {c}'
          print('All classifiers valid.')
          "
      - run: python -m pytest tests/build/test_dist_contents.py
      - id: ver
        # Strip everything up to + including the last "v" so both tag formats
        # resolve to a clean PEP 440 version (onepin-v0.2.0 / v0.2.0 -> 0.2.0).
        # Prefer inputs.tag: on workflow_dispatch GITHUB_REF_NAME is the branch
        # (e.g. main), not the tag, which would otherwise yield a bogus version.
        env:
          TAG_REF: ${{ inputs.tag || github.ref_name }}
        run: |
          version="${TAG_REF##*v}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]] || { echo "::error::bad version from '$TAG_REF'"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with: { name: dist, path: dist/* }
  smoke-install:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with: { name: dist, path: dist }
      - run: pip install dist/*.whl && onepin --version
      - run: pip install --no-binary onepin dist/onepin-*.tar.gz && onepin --version
  test-pypi:
    needs: smoke-install
    runs-on: ubuntu-latest
    environment: testpypi
    permissions: { id-token: write }
    steps:
      - uses: actions/download-artifact@v8
        with: { name: dist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # Allow re-runs on the same tag: TestPyPI rejects identical-version
          # re-uploads, but a retag (e.g. after fixing a workflow bug) shouldn't
          # cause the whole publish chain to fail.
          skip-existing: true
  testpypi-smoke:
    needs: [build, test-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: |
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            onepin==${{ needs.build.outputs.version }} \
            && onepin --version
  pypi:
    needs: testpypi-smoke
    runs-on: ubuntu-latest
    environment: pypi
    permissions: { id-token: write, contents: write, attestations: write }
    steps:
      - uses: actions/download-artifact@v8
        with: { name: dist, path: dist }
      # Create a GitHub-stored build-provenance attestation for the exact published
      # artifacts. pypa/gh-action-pypi-publish only writes PEP 740 attestations to PyPI;
      # the verify step below queries GitHub's attestation store, so without this it finds
      # nothing and fails. Attest before upload so the published bytes are what's covered.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'
      - uses: pypa/gh-action-pypi-publish@release/v1
      - name: Verify provenance attestation
        # Repo-scoped query: org-level endpoint returns 404 even when the
        # attestation exists on the repo. `--repo` resolves correctly.
        run: gh attestation verify dist/*.whl --repo podonos/onepin-python
        env:
          GH_TOKEN: ${{ github.token }}
  notify-failure:
    if: failure()
    needs: [build, smoke-install, test-pypi, testpypi-smoke, pypi]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {"text":"Publish failed for ${{ github.ref_name }} in ${{ github.repository }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      - name: Skip Slack notification
        if: env.SLACK_WEBHOOK_URL == ''
        run: echo "SLACK_WEBHOOK_URL is not configured; skipping Slack notification."
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
