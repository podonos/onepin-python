name: release-please validate
on:
  pull_request:
    paths:
      - 'release-please-config.json'
      - '.release-please-manifest.json'
permissions:
  contents: read
jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: googleapis/release-please-action@v4
        with: { skip-github-release: true }
