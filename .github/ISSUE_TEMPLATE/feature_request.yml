name: Feature request
description: Suggest an enhancement to the onepin SDK or CLI
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point, not just a proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like onepin to do? CLI command, SDK method, flag, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other approaches you weighed.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Note: behavior backed by the OnePin API may require API-side changes that
        live outside this repository. CLI ergonomics and SDK wrappers are in scope here.
